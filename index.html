<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>To-Do App Arel github</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <!-- To do heading part -->
     <div id="head-div" 
     class="container-md bg-primary-subtle
      border rounded-3 border-5 border-success-subtle  ">
        <h2 class="text text-black-50">To Do List</h2>
     </div>

    <!-- entering task part -->
    <div class="input-group mb-3 border rounded-3" id="enter-task">

    <input id="user-task" class="form-control " placeholder="Enter your task" aria-label="Enter your task" aria-describedby="button-addon2">
    <button class="btn btn-outline-secondary btn-success text text-white" type="button" id="button-addon2">Add</button>
    </div>
    
    
    <!-- Scrolling tasks part -->
    <div id="caro" class="container-md overflow-y-auto border rounded-3 ">

    </div>

    <!-- Logical part -->
    <script src="./script.js" type="module"></script>
    <!-- <script src="genCom.js"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
